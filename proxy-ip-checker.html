<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProxyIP Checker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg:       #0d0f12;
    --surface:  #141720;
    --border:   #1e2330;
    --border2:  #2a3040;
    --text:     #c8d0e0;
    --dim:      #4a5568;
    --accent:   #3b82f6;
    --green:    #22d3a0;
    --yellow:   #f59e0b;
    --red:      #ef4444;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 24px 16px;
  }

  .header {
    max-width: 760px;
    margin: 0 auto 32px;
    display: flex;
    align-items: baseline;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }
  .header h1 {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .header .tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.25);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .container { max-width: 760px; margin: 0 auto; }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .ip-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: #fff;
    font-family: var(--mono);
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s;
  }
  .ip-input:focus { border-color: var(--accent); }
  .ip-input::placeholder { color: var(--dim); }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-clear {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--dim);
    padding: 10px 14px;
  }
  .btn-clear:hover { border-color: var(--border2); color: var(--text); opacity: 1; }

  .batch-area {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: #fff;
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 14px;
    border-radius: 6px;
    outline: none;
    resize: vertical;
    min-height: 100px;
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }
  .batch-area:focus { border-color: var(--accent); }
  .batch-area::placeholder { color: var(--dim); }

  .mode-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .tab {
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active {
    background: rgba(59,130,246,0.15);
    border-color: rgba(59,130,246,0.4);
    color: var(--accent);
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 8px;
  }

  .worker-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
  }
  .worker-bar span { color: var(--dim); }
  .worker-bar .url { color: var(--green); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .worker-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .results { margin-top: 20px; }

  .result-header {
    display: grid;
    grid-template-columns: 1fr 60px 50px 60px 30px 110px;
    gap: 8px;
    padding: 6px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .result-row {
    display: grid;
    grid-template-columns: 1fr 60px 50px 60px 30px 110px;
    gap: 8px;
    padding: 9px 12px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 13px;
    border: 1px solid transparent;
    transition: background 0.1s, border-color 0.1s;
    cursor: default;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

  .result-row:hover {
    background: var(--surface);
    border-color: var(--border);
  }
  .result-row.failed { opacity: 0.4; }

  .cell-ip { color: #fff; font-weight: 600; }
  .cell-cc { color: var(--dim); }
  .cell-org { color: var(--dim); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge-ok   { background: rgba(34,211,160,0.15); color: var(--green); border: 1px solid rgba(34,211,160,0.3); }
  .badge-fail { background: rgba(239,68,68,0.1);   color: var(--red);   border: 1px solid rgba(239,68,68,0.2); }

  .risk-low    { color: var(--green); }
  .risk-medium { color: var(--yellow); }
  .risk-high   { color: var(--red); }

  .ping-fast { color: var(--green); }
  .ping-ok   { color: var(--yellow); }
  .ping-slow { color: var(--red); }

  .stats {
    display: flex;
    gap: 20px;
    padding: 12px 0;
    border-top: 1px solid var(--border);
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 12px;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-size: 18px; font-weight: 700; }
  .stat-lbl { color: var(--dim); font-size: 11px; }

  .loading-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--dim);
    animation: fadeIn 0.2s ease;
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .progress-bar-wrap {
    display: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .progress-bar-wrap.visible { display: block; }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.2s ease;
  }
  .progress-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 8px;
    display: none;
  }
  .progress-label.visible { display: block; }

  .export-bar {
    display: none;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .export-bar.visible { display: flex; }
  .btn-export {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--dim);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-export:hover { color: var(--text); border-color: var(--border2); background: var(--surface); }

  .empty {
    text-align: center;
    padding: 40px 0;
    color: var(--dim);
    font-family: var(--mono);
    font-size: 13px;
  }

  .range-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .range-row .ip-input { flex: 1; }

  @media (max-width: 520px) {
    .result-header,
    .result-row {
      grid-template-columns: 1fr 50px 40px 50px 30px;
    }
    .cell-org, .col-org { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>ProxyIP Checker</h1>
  <span class="tag">v5</span>
</div>

<div class="container">

  <div class="worker-bar">
    <div class="worker-dot"></div>
    <span>Worker:</span>
    <span class="url" id="worker-url-display">https://my-checker.rockjudgement.workers.dev</span>
  </div>

  <div class="mode-tabs">
    <button class="tab active" data-mode="single" onclick="setMode('single')">Single</button>
    <button class="tab" data-mode="list" onclick="setMode('list')">List</button>
    <button class="tab" data-mode="range" onclick="setMode('range')">Range</button>
    <button class="tab" data-mode="url" onclick="setMode('url')">URL</button>
  </div>

  <!-- single -->
  <div class="panel active" id="panel-single">
    <div class="input-row">
      <input class="ip-input" id="ip-input" type="text"
        placeholder="Enter IP address — e.g. 104.16.0.1"
        onkeydown="if(event.key==='Enter') checkSingle()">
      <button class="btn" id="btn-single" onclick="checkSingle()">Check</button>
    </div>
  </div>

  <!-- list -->
  <div class="panel" id="panel-list">
    <textarea class="batch-area" id="list-input"
      placeholder="One IP per line:&#10;1.1.1.1&#10;8.8.8.8&#10;104.16.0.1"></textarea>
    <button class="btn" id="btn-list" onclick="checkList()" style="width:100%">Check All</button>
  </div>

  <!-- range -->
  <div class="panel" id="panel-range">
    <div class="hint">CIDR (e.g. 1.2.3.0/24, supports /16 /23 /24) or dash range (1.2.3.10-1.2.3.50)</div>
    <div class="range-row">
      <input class="ip-input" id="range-input" type="text" placeholder="1.2.3.0/24  or  1.2.3.10-1.2.3.50">
      <button class="btn" id="btn-range" onclick="checkRange()">Scan</button>
    </div>
  </div>

  <!-- url -->
  <div class="panel" id="panel-url">
    <div class="hint">Fetch a plain-text IP list from a URL (one IP per line)</div>
    <div class="range-row">
      <input class="ip-input" id="url-input" type="text" placeholder="https://raw.githubusercontent.com/.../ips.txt">
      <button class="btn" id="btn-url" onclick="checkUrl()">Fetch &amp; Scan</button>
    </div>
  </div>

  <div class="progress-label" id="progress-label">Checking 0 / 0...</div>
  <div class="progress-bar-wrap" id="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div class="results" id="results">
    <div class="empty" id="empty-state">Enter an IP above to check it.</div>
  </div>

  <div class="export-bar" id="export-bar">
    <button class="btn-export" onclick="exportCSV()">Export CSV</button>
    <button class="btn-export" onclick="exportJSON()">Export JSON</button>
    <button class="btn-export" onclick="copyWorking()">Copy working IPs</button>
    <button class="btn-export" onclick="clearAll()">Clear results</button>
  </div>

</div>

<script>
// 👇 Replace with YOUR deployed Worker URL (see README → Deployment)
const WORKER = "https://my-checker.rockjudgement.workers.dev";
document.getElementById('worker-url-display').textContent = WORKER;
const CONCURRENCY = 6;

let allResults = [];
let checking = false;

// ── mode switch ──────────────────────────────────────────
function setMode(m) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + m));
}

// ── IP range expansion ───────────────────────────────────
function expandRange(range) {
  range = range.trim();
  const ips = [];

  if (range.includes('/')) {
    const [base, prefixStr] = range.split('/');
    const prefix = parseInt(prefixStr, 10);
    const [a, b, c, d] = base.split('.').map(Number);

    if (prefix === 24) {
      for (let i = 1; i <= 254; i++) ips.push(`${a}.${b}.${c}.${i}`);
    } else if (prefix === 23) {
      for (let off = 0; off <= 1; off++)
        for (let i = 1; i <= 254; i++) ips.push(`${a}.${b}.${c+off}.${i}`);
    } else if (prefix === 22) {
      for (let off = 0; off <= 3; off++)
        for (let i = 1; i <= 254; i++) ips.push(`${a}.${b}.${c+off}.${i}`);
    } else if (prefix === 16) {
      throw new Error('/16 is 65k+ IPs — too large for browser scanning. Use /22 or smaller.');
    } else {
      throw new Error('Only /22, /23, /24 CIDR supported.');
    }
  } else if (range.includes('-')) {
    const [start, end] = range.split('-').map(s => s.trim());
    const parts = start.split('.').map(Number);
    const [a, b, c] = parts;
    const dStart = parts[3];
    const dEnd = end.includes('.') ? Number(end.split('.')[3]) : Number(end);
    if (dEnd < dStart) throw new Error('Invalid range: end < start.');
    if (dEnd - dStart > 1000) throw new Error('Range too large (max 1000 IPs at a time).');
    for (let i = dStart; i <= dEnd; i++) ips.push(`${a}.${b}.${c}.${i}`);
  } else {
    throw new Error('Invalid format. Use CIDR (1.2.3.0/24) or dash range (1.2.3.10-1.2.3.50).');
  }

  return ips;
}

// ── checks ───────────────────────────────────────────────
async function checkSingle() {
  const ip = document.getElementById('ip-input').value.trim();
  if (!ip) return;
  if (!/^\d{1,3}(\.\d{1,3}){3}$/.test(ip)) { showError('Invalid IP format'); return; }
  if (checking) return;

  setChecking(true);
  clearEmptyState();
  addLoadingRow(ip);
  const result = await fetchCheck(ip);
  removeLoadingRow(ip);
  allResults.push(result);
  renderAll();
  setChecking(false);
  document.getElementById('ip-input').value = '';
}

async function checkList() {
  const raw = document.getElementById('list-input').value;
  const ips = raw.split('\n')
    .map(l => l.trim().split(',')[0].trim())
    .filter(l => /^\d{1,3}(\.\d{1,3}){3}$/.test(l));
  if (!ips.length) { showError('No valid IPs found.'); return; }
  await runScan(ips);
}

function checkRange() {
  const range = document.getElementById('range-input').value.trim();
  if (!range) return;
  let ips;
  try { ips = expandRange(range); }
  catch (e) { showError(e.message); return; }
  runScan(ips);
}

async function checkUrl() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  if (checking) return;

  setChecking(true);
  showInfo('Downloading list...');
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const ips = text.split('\n')
      .map(l => l.trim().split(',')[0].trim())
      .filter(l => /^\d{1,3}(\.\d{1,3}){3}$/.test(l));
    if (!ips.length) { showError('No valid IPs found at that URL.'); setChecking(false); return; }
    setChecking(false);
    await runScan(ips);
  } catch (e) {
    setChecking(false);
    showError('Fetch failed: ' + e.message + ' (CORS may be blocking this URL)');
  }
}

// ── core scan runner with concurrency + progress ────────
async function runScan(ips) {
  if (checking) return;
  setChecking(true);
  clearResults();

  const total = ips.length;
  let done = 0;
  showProgress(done, total);

  let idx = 0;
  async function worker() {
    while (idx < ips.length) {
      const ip = ips[idx++];
      const r = await fetchCheck(ip);
      allResults.push(r);
      done++;
      showProgress(done, total);
      renderAll();
    }
  }

  const workers = Array.from({ length: Math.min(CONCURRENCY, ips.length) }, worker);
  await Promise.all(workers);

  hideProgress();
  setChecking(false);
}

// ── API call ─────────────────────────────────────────────
async function fetchCheck(ip) {
  try {
    const resp = await fetch(`${WORKER}/check?ip=${ip}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    return data;
  } catch(e) {
    return { ip, success: false, risk: 100, error: e.message, country: null, org: null, latency_ms: null };
  }
}

// ── render ───────────────────────────────────────────────
function renderAll() {
  const sorted = [...allResults].sort((a, b) => {
    if (a.success !== b.success) return a.success ? -1 : 1;
    if ((a.risk ?? 100) !== (b.risk ?? 100)) return (a.risk ?? 100) - (b.risk ?? 100);
    return (a.latency_ms ?? 9999) - (b.latency_ms ?? 9999);
  });

  const container = document.getElementById('results');
  container.innerHTML = '';

  if (!sorted.length) {
    container.innerHTML = '<div class="empty" id="empty-state">No results yet.</div>';
    document.getElementById('export-bar').classList.remove('visible');
    return;
  }

  const hdr = document.createElement('div');
  hdr.className = 'result-header';
  hdr.innerHTML = `
    <span>IP</span>
    <span>Status</span>
    <span>Risk</span>
    <span class="col-port">Ping</span>
    <span>CC</span>
    <span class="col-org">Org</span>
  `;
  container.appendChild(hdr);

  sorted.forEach(r => {
    const row = document.createElement('div');
    row.className = 'result-row ' + (r.success ? 'success' : 'failed');

    const riskClass = (r.risk ?? 100) <= 10 ? 'risk-low' : (r.risk ?? 100) <= 40 ? 'risk-medium' : 'risk-high';
    const hasLatency = r.success && typeof r.latency_ms === 'number';
    const pingLabel = hasLatency ? r.latency_ms + 'ms' : '—';
    const pingClass = !hasLatency ? '' : r.latency_ms < 100 ? 'ping-fast' : r.latency_ms < 300 ? 'ping-ok' : 'ping-slow';

    const statusBadge = r.success
      ? '<span class="badge badge-ok">OK</span>'
      : '<span class="badge badge-fail">FAIL</span>';

    const riskVal = r.success ? `<span class="${riskClass}">${r.risk ?? '—'}</span>` : `<span class="risk-high">—</span>`;
    const pingVal = `<span class="${pingClass}">${pingLabel}</span>`;
    const orgText = r.org ? r.org.slice(0,24) : (r.error ? r.error.slice(0,24) : '—');

    row.innerHTML = `
      <span class="cell-ip">${r.ip}</span>
      <span>${statusBadge}</span>
      <span>${riskVal}</span>
      <span class="col-port">${pingVal}</span>
      <span class="cell-cc">${r.country || '—'}</span>
      <span class="cell-org col-org">${orgText}</span>
    `;
    container.appendChild(row);
  });

  renderStats();
  document.getElementById('export-bar').classList.toggle('visible', allResults.length > 0);
}

function renderStats() {
  const container = document.getElementById('results');
  let statsEl = document.getElementById('stats-bar');
  if (!statsEl) {
    statsEl = document.createElement('div');
    statsEl.className = 'stats';
    statsEl.id = 'stats-bar';
    container.appendChild(statsEl);
  }
  const total   = allResults.length;
  const working = allResults.filter(r => r.success).length;
  const clean   = allResults.filter(r => r.success && (r.risk ?? 100) <= 10).length;
  const failed  = total - working;

  statsEl.innerHTML = `
    <div class="stat"><span class="stat-val">${total}</span><span class="stat-lbl">Total</span></div>
    <div class="stat"><span class="stat-val" style="color:var(--green)">${working}</span><span class="stat-lbl">Working</span></div>
    <div class="stat"><span class="stat-val" style="color:var(--accent)">${clean}</span><span class="stat-lbl">Risk ≤ 10</span></div>
    <div class="stat"><span class="stat-val" style="color:var(--red)">${failed}</span><span class="stat-lbl">Failed</span></div>
  `;
}

// ── progress ─────────────────────────────────────────────
function showProgress(done, total) {
  const wrap = document.getElementById('progress-wrap');
  const bar = document.getElementById('progress-bar');
  const label = document.getElementById('progress-label');
  wrap.classList.add('visible');
  label.classList.add('visible');
  bar.style.width = total ? (done/total*100) + '%' : '0%';
  label.textContent = `Checking ${done} / ${total}...`;
}
function hideProgress() {
  document.getElementById('progress-wrap').classList.remove('visible');
  document.getElementById('progress-label').classList.remove('visible');
}

// ── loading row (single mode) ───────────────────────────
function addLoadingRow(ip) {
  const container = document.getElementById('results');
  const row = document.createElement('div');
  row.className = 'loading-row';
  row.id = 'loading-' + ip.replace(/\./g, '_');
  row.innerHTML = `<div class="spinner"></div><span>${ip}</span><span style="color:var(--dim);font-size:12px">checking...</span>`;
  container.insertBefore(row, container.firstChild);
}
function removeLoadingRow(ip) {
  const el = document.getElementById('loading-' + ip.replace(/\./g, '_'));
  if (el) el.remove();
}

function clearEmptyState() {
  const el = document.getElementById('empty-state');
  if (el) el.remove();
}

// ── helpers ──────────────────────────────────────────────
function clearAll() {
  allResults = [];
  renderAll();
}
function clearResults() {
  allResults = [];
  document.getElementById('results').innerHTML = '';
}
function setChecking(v) {
  checking = v;
  ['btn-single','btn-list','btn-range','btn-url'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = v;
  });
}
function showError(msg) {
  const container = document.getElementById('results');
  const el = document.createElement('div');
  el.style.cssText = 'padding:10px 12px;color:var(--red);font-family:var(--mono);font-size:13px;';
  el.textContent = '! ' + msg;
  container.insertBefore(el, container.firstChild);
  setTimeout(() => el.remove(), 4000);
}
function showInfo(msg) {
  const container = document.getElementById('results');
  const el = document.createElement('div');
  el.id = 'info-msg';
  el.style.cssText = 'padding:10px 12px;color:var(--dim);font-family:var(--mono);font-size:13px;';
  el.textContent = msg;
  container.insertBefore(el, container.firstChild);
}

// ── exports ──────────────────────────────────────────────
function exportCSV() {
  const rows = [['ip','success','risk','risk_level','latency_ms','country','org','isp','proxy_flag','hosting']];
  allResults.forEach(r => rows.push([
    r.ip, r.success, r.risk??'', r.risk_level??'',
    r.latency_ms??'', r.country??'', r.org??'', r.isp??'',
    r.proxy_flag??'', r.hosting??''
  ]));
  download('proxyip-results.csv', rows.map(r => r.join(',')).join('\n'), 'text/csv');
}
function exportJSON() {
  download('proxyip-results.json', JSON.stringify(allResults, null, 2), 'application/json');
}
function copyWorking() {
  const ips = allResults.filter(r => r.success && (r.risk ?? 100) <= 10).map(r => r.ip).join('\n');
  if (!ips) { showError('No clean IPs to copy yet.'); return; }
  copyToClipboard(ips, document.querySelector('[onclick="copyWorking()"]'));
}

function copyToClipboard(text, btn) {
  function done(ok) {
    if (!btn) return;
    const orig = btn.textContent;
    btn.textContent = ok ? 'Copied!' : 'Copy failed';
    setTimeout(() => btn.textContent = orig, 1500);
  }

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => done(true)).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, cb) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    cb(ok);
  } catch (e) {
    cb(false);
  }
}
function download(filename, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type }));
  a.download = filename;
  a.click();
}
